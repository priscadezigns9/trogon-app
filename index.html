<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trogon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf6;font-family:Inter,system-ui,sans-serif;
display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.logo{width:72px;height:72px;border-radius:50%;object-fit:cover}
.name{font-size:1.1rem;font-weight:800;letter-spacing:4px;color:#e8eaf6}
.sub{color:#555;font-size:0.8rem}
</style>
</head>
<body>
<img src="/trogon_logo.png" class="logo" onerror="this.style.display='none'">
<div class="name">TROGON</div>
<div class="sub" id="status">Loading...</div>
<script>
(function(){
  // Inject keys into localStorage
  localStorage.setItem('trogon_sb_key','sb_publishable_UicuMabi1dRKAvQ4YGiakg_NCMnftfS');
  if(!localStorage.getItem('trogon_groq_key')){
    localStorage.setItem('trogon_groq_key','gsk_placeholder');
  }

  var isCallback = window.location.hash.includes('access_token') ||
                   window.location.search.includes('code=') ||
                   window.location.search.includes('error=');

  document.getElementById('status').textContent = isCallback ? 'Signing you in...' : 'Loading dashboard...';

  // Load autoconfig first, then the real app
  var script = document.createElement('script');
  script.src = '/autoconfig.js';
  script.onload = function() {
    fetch('/app.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.open();
        document.write(html);
        document.close();
      })
      .catch(function(){
        document.getElementById('status').textContent = 'Error loading app. Please refresh.';
      });
  };
  script.onerror = function() {
    // autoconfig failed to load, just load app directly
    fetch('/app.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.open();
        document.write(html);
        document.close();
      });
  };
  document.head.appendChild(script);
})();
</script>
</body>
</html>
