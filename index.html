<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trogon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf6;font-family:Inter,system-ui,sans-serif;
display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.logo{width:72px;height:72px;border-radius:50%;object-fit:cover}
.name{font-size:1.1rem;font-weight:800;letter-spacing:4px}
.sub{color:#555;font-size:0.8rem}
</style>
</head>
<body>
<img src="/trogon_logo.png" class="logo" onerror="this.style.display='none'">
<div class="name">TROGON</div>
<div class="sub" id="status">Loading...</div>
<script>
// Inline the key patch immediately — before anything else
var REAL_KEY = 'sb_publishable_UicuMabi1dRKAvQ4YGiakg_NCMnftfS';
var SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';

// Override localStorage FIRST so app.html line 1598 reads the real key
localStorage.setItem('trogon_sb_key', REAL_KEY);
if(!localStorage.getItem('trogon_groq_key')) localStorage.setItem('trogon_groq_key','gsk_placeholder');

// Also override SUPABASE_ANON_KEY on window so const declaration in app.html picks it up
// (can't override a const, but we can set a global that the code checks)
window.TROGON_SB_KEY_OVERRIDE = REAL_KEY;

document.getElementById('status').textContent = 'Initializing...';

// Fetch both sb-fix.js and app.html, inline the fix into app.html head
Promise.all([
  fetch('/sb-fix.js').then(function(r){ return r.text(); }),
  fetch('/app.html').then(function(r){ return r.text(); })
]).then(function(results) {
  var fixJs = results[0];
  var appHtml = results[1];
  
  // Patch SUPABASE_ANON_KEY placeholder with real key directly in the HTML
  appHtml = appHtml.replace(
    "const SUPABASE_ANON_KEY = 'SUPABASE_ANON_KEY_PLACEHOLDER';",
    "const SUPABASE_ANON_KEY = '" + REAL_KEY + "';"
  );
  
  // Inject fix script inline into <head> (runs synchronously before app scripts)
  var inlineScript = '<script>' + fixJs + '<\/script>';
  appHtml = appHtml.replace('<head>', '<head>' + inlineScript);
  
  document.open();
  document.write(appHtml);
  document.close();
}).catch(function(e) {
  console.error('Loader error:', e);
  localStorage.setItem('trogon_sb_key', REAL_KEY);
  window.location.replace('/app.html');
});
</script>
</body>
</html>
