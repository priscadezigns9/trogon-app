<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trogon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf6;font-family:Inter,system-ui,sans-serif;
display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.logo{width:72px;height:72px;border-radius:50%;object-fit:cover}
.name{font-size:1.1rem;font-weight:800;letter-spacing:4px}
.sub{color:#555;font-size:0.8rem}
</style>
</head>
<body>
<img src="/trogon_logo.png" class="logo" onerror="this.style.display='none'">
<div class="name">TROGON</div>
<div class="sub" id="status">Loading...</div>
<script>
var REAL_KEY = 'sb_publishable_UicuMabi1dRKAvQ4YGiakg_NCMnftfS';
localStorage.setItem('trogon_sb_key', REAL_KEY);
if(!localStorage.getItem('trogon_groq_key')) localStorage.setItem('trogon_groq_key','gsk_placeholder');
document.getElementById('status').textContent = 'Starting...';

// Fetch app.html, inject sb-fix.js as first script in <head>, write to page
fetch('/app.html')
  .then(function(r){ return r.text(); })
  .then(function(html){
    // Inject sb-fix.js BEFORE all other scripts
    var patched = html.replace('<head>', '<head><script src="/sb-fix.js"><\/script>');
    // Write to page using a data URL approach
    var parser = new DOMParser();
    var doc = parser.parseFromString(patched, 'text/html');
    
    // Replace current document
    document.open('text/html');
    document.write(patched);
    document.close();
  })
  .catch(function(e){
    document.getElementById('status').textContent = 'Error. Redirecting...';
    setTimeout(function(){ window.location.replace('/app.html'); }, 1000);
  });
</script>
</body>
</html>
