name: patch-app-magic-link
on:
  push:
    branches: [main]
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch app.html
        run: |
          python3 -c "import base64; exec(base64.b64decode('').decode())"
      - name: Commit and push
        run: |
          git config user.email bot@priscadezigns.org
          git config user.name Zapia
          git add app.html
          git diff --staged --quiet && echo No-changes || git commit -m fix-magic-link && git push
